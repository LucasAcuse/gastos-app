<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Gastos</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <header>
        <h1>💸 Mis Gastos</h1>
        <p>Registrá y controlá tus gastos fácilmente</p>
    </header>

    <main>

        <section class="formulario">
            <h2>Agregar gasto</h2>
            <div class="campos">
                <input type="text" id="descripcion" placeholder="Descripción (ej: Café)" />
                <input type="number" id="monto" placeholder="Monto (ej: 350)" />
                <select id="categoria">
                    <option value="Sin categoría">Sin categoría</option>
                    <option value="Comida">🍔 Comida</option>
                    <option value="Transporte">🚌 Transporte</option>
                    <option value="Entretenimiento">🎬 Entretenimiento</option>
                    <option value="Salud">💊 Salud</option>
                    <option value="Educación">📚 Educación</option>
                    <option value="Ropa">👕 Ropa</option>
                    <option value="Otros">📦 Otros</option>
                </select>
                <button onclick="agregarGasto()">Agregar</button>
            </div>
            <p id="mensaje"></p>
        </section>

        <section class="filtro">
            <h2>Filtrar por categoría</h2>
            <div class="campos">
                <select id="filtro-categoria" onchange="verGastos()">
                    <option value="todas">Todas las categorías</option>
                    <option value="Sin categoría">Sin categoría</option>
                    <option value="Comida">🍔 Comida</option>
                    <option value="Transporte">🚌 Transporte</option>
                    <option value="Entretenimiento">🎬 Entretenimiento</option>
                    <option value="Salud">💊 Salud</option>
                    <option value="Educación">📚 Educación</option>
                    <option value="Ropa">👕 Ropa</option>
                    <option value="Otros">📦 Otros</option>
                </select>
            </div>
        </section>

        <section class="lista">
            <div class="lista-header">
                <h2>Lista de gastos</h2>
                <button class="btn-ver" onclick="verGastos()">Actualizar</button>
            </div>

            <table id="tabla-gastos">
                <thead>
                    <tr>
                        <th>Descripción</th>
                        <th>Categoría</th>
                        <th>Monto</th>
                        <th>Borrar</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-tabla">
                    <tr>
                        <td colspan="4" class="vacio">Todavía no hay gastos cargados.</td>
                    </tr>
                </tbody>
            </table>

            <div class="total" id="total"></div>
        </section>

    </main>

    <script>
        async function agregarGasto() {
            const descripcion = document.getElementById('descripcion').value;
            const monto = document.getElementById('monto').value;
            const categoria = document.getElementById('categoria').value;
            const mensaje = document.getElementById('mensaje');

            if (!descripcion || !monto) {
                mensaje.textContent = '⚠️ Completá ambos campos.';
                mensaje.style.color = '#e74c3c';
                return;
            }

            const response = await fetch('/gastos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ descripcion, monto: parseFloat(monto), categoria })
            });

            const data = await response.json();
            mensaje.textContent = '✅ ' + data.mensaje;
            mensaje.style.color = '#27ae60';

            document.getElementById('descripcion').value = '';
            document.getElementById('monto').value = '';

            verGastos();
        }

        async function borrarGasto(id) {
            await fetch(`/gastos/${id}`, { method: 'DELETE' });
            verGastos();
        }

        async function verGastos() {
            const categoria = document.getElementById('filtro-categoria').value;
            const url = categoria === 'todas' ? '/gastos' : `/gastos?categoria=${encodeURIComponent(categoria)}`;

            const response = await fetch(url);
            const data = await response.json();

            const tbody = document.getElementById('cuerpo-tabla');
            const totalDiv = document.getElementById('total');

            if (data.gastos.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="vacio">Todavía no hay gastos cargados.</td></tr>';
                totalDiv.textContent = '';
                return;
            }

            tbody.innerHTML = data.gastos.map(g => `
                <tr>
                    <td>${g.descripcion}</td>
                    <td>${g.categoria}</td>
                    <td>$${g.monto.toFixed(2)}</td>
                    <td><button class="btn-borrar" onclick="borrarGasto(${g.id})">🗑️</button></td>
                </tr>
            `).join('');

            totalDiv.textContent = `Total: $${data.total.toFixed(2)}`;
        }

        verGastos();
    </script>

</body>
</html>
